<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Dark background -->
  <rect width="32" height="32" rx="6" fill="#1A1410"/>

  <!-- Diamond gem shape in rose gold -->
  <polygon points="16,4 26,12 16,28 6,12" fill="none" stroke="#B76E79" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Horizontal facet line -->
  <line x1="6" y1="12" x2="26" y2="12" stroke="#B76E79" stroke-width="1.5"/>
  <!-- Top-left facet -->
  <line x1="16" y1="4" x2="11" y2="12" stroke="#B76E79" stroke-width="1" opacity="0.6"/>
  <!-- Top-right facet -->
  <line x1="16" y1="4" x2="21" y2="12" stroke="#B76E79" stroke-width="1" opacity="0.6"/>
  <!-- Center line to tip -->
  <line x1="16" y1="12" x2="16" y2="28" stroke="#B76E79" stroke-width="1" opacity="0.4"/>
</svg>
